<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Current Visualizer - 海面流可視化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.9.2/dist/leaflet-velocity.min.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@1.9.2/dist/leaflet-velocity.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e8f0;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #sidebar {
            width: 320px;
            background: #1a2a4a;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #2a4a7a;
        }
        #map-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex: 1;
        }
        #timeline-container {
            background: #1a2a4a;
            padding: 12px 20px;
            border-top: 1px solid #2a4a7a;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #64b5f6;
        }
        h2 {
            font-size: 14px;
            font-weight: bold;
            margin: 15px 0 10px 0;
            color: #90caf9;
            border-bottom: 1px solid #2a4a7a;
            padding-bottom: 8px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #b3e5fc;
        }
        input[type="file"] {
            width: 100%;
            padding: 6px;
            background: #1e3a5f;
            color: #e0e8f0;
            border: 1px solid #2a5080;
            border-radius: 3px;
            font-size: 12px;
        }
        input[type="range"] {
            width: 100%;
            margin: 5px 0;
        }
        input[type="checkbox"] {
            margin-right: 6px;
        }
        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 10px;
            background: #2a5080;
            color: #e0e8f0;
            border: 1px solid #3a6a9a;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        button:hover { background: #3a6a9a; }
        button.active {
            background: #64b5f6;
            color: #0a0e27;
            border-color: #64b5f6;
        }
        button.primary {
            grid-column: 1 / -1;
            background: #4a9eff;
        }
        button.primary:hover { background: #64b5f6; }
        .info-box {
            background: rgba(100, 181, 246, 0.1);
            padding: 8px;
            border-left: 2px solid #64b5f6;
            font-size: 11px;
            margin-bottom: 10px;
            border-radius: 2px;
            line-height: 1.4;
        }
        #status {
            font-size: 11px;
            margin-top: 10px;
            padding: 8px;
            background: rgba(0, 200, 100, 0.1);
            border-left: 2px solid #00c864;
            border-radius: 2px;
        }
        .slider-value {
            display: inline-block;
            float: right;
            font-weight: bold;
            color: #64b5f6;
        }
        #timeline-container label {
            display: inline;
            margin-right: 10px;
        }
        #timeline-slider {
            width: 60%;
        }
        .leaflet-control {
            background: #1a2a4a;
            color: #e0e8f0;
            border: 1px solid #2a4a7a;
        }
        .leaflet-control-attribution {
            background: rgba(26, 42, 74, 0.8);
            font-size: 10px;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f1a32;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a5080;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a6a9a;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="main">
            <div id="sidebar">
                <h1>🌊 海面流可視化</h1>

                <div class="info-box">
                    複数の可視化方法で海流データを表示します。
                </div>

                <!-- データ読み込み -->
                <h2>データ読み込み</h2>
                <div class="control-group">
                    <label>JSON ファイル選択</label>
                    <input type="file" id="jsonFile" accept=".json">
                </div>
                <button class="primary" onclick="loadJSON()">読み込む</button>

                <!-- 可視化モード -->
                <h2>可視化モード</h2>
                <div class="mode-buttons">
                    <button class="active" onclick="setVizMode('arrow')">矢印</button>
                    <button onclick="setVizMode('particle')">粒子</button>
                </div>

                <!-- 表示設定 -->
                <h2>表示設定</h2>
                <div class="control-group">
                    <label>矢印太さ <span class="slider-value" id="arrowThicknessValue">2</span>px</label>
                    <input type="range" id="arrowThicknessSlider" min="1" max="5" step="0.5" value="2" oninput="updateDisplay()">
                </div>
                <div class="control-group">
                    <label>矢印スケール <span class="slider-value" id="scaleValue">1.0×</span></label>
                    <input type="range" id="scaleSlider" min="0.5" max="3" step="0.5" value="1" oninput="updateDisplay()">
                </div>
                <div class="control-group">
                    <label>粒子速度 <span class="slider-value" id="particleSpeedValue">1.0×</span></label>
                    <input type="range" id="particleSpeedSlider" min="0.5" max="3" step="0.5" value="1" oninput="updateDisplay()">
                </div>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="colorBySpeed" checked onchange="updateDisplay()">
                        速度で色分け
                    </label>
                </div>

                <!-- カラーバー（凡例） -->
                <h2>速度凡例</h2>
                <div style="font-size: 11px; line-height: 1.8;">
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <div style="width: 20px; height: 12px; background: #0088ff; margin-right: 6px;"></div>
                        <span>0.0-0.125 m/s</span>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <div style="width: 20px; height: 12px; background: #00ffff; margin-right: 6px;"></div>
                        <span>0.125-0.25 m/s</span>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <div style="width: 20px; height: 12px; background: #00ff00; margin-right: 6px;"></div>
                        <span>0.25-0.375 m/s</span>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 4px;">
                        <div style="width: 20px; height: 12px; background: #ffff00; margin-right: 6px;"></div>
                        <span>0.375-0.45 m/s</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div style="width: 20px; height: 12px; background: #ff0000; margin-right: 6px;"></div>
                        <span>0.45+ m/s</span>
                    </div>
                </div>

                <!-- ステータス -->
                <h2>ステータス</h2>
                <div id="status">待機中...</div>
            </div>

            <div id="map-container">
                <div id="map"></div>
            </div>
        </div>

        <div id="timeline-container">
            <label>時刻:</label>
            <input type="range" id="timeline-slider" min="0" max="9" value="0" oninput="setTimelineIndex()">
            <label id="timelineLabel">2026-04-07 00:00</label>
            <button style="width: 60px; float: right; margin-left: 8px;" onclick="toggleTimeline()">
                <span id="playBtnText">▶ 再生</span>
            </button>
        </div>
    </div>

    <script>
        'use strict';

        // グローバル変数
        let allData = null;
        let currentEntryIdx = 0;
        let vizMode = 'arrow';
        let map = null;
        let vizLayer = null;
        let timelineTimer = null;
        const LAT_MIN = 41.0;


        // 初期化
        function initMap() {
            map = L.map('map').setView([43.0, 145.0], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19,
                minZoom: 5
            }).addTo(map);
        }

        function el(id) { return document.getElementById(id); }

        function setStatus(msg) {
            el('status').textContent = msg;
            console.log(msg);
        }

        // JSON 読み込み
        function loadJSON() {
            const fileInput = el('jsonFile');
            if (!fileInput.files.length) {
                alert('ファイルを選択してください');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                try {
                    allData = JSON.parse(e.target.result);

                    if (!allData.entries || allData.entries.length === 0) {
                        throw new Error('entries が見つかりません');
                    }

                    // タイムラインスライダーを更新
                    const slider = el('timeline-slider');
                    slider.max = allData.entries.length - 1;
                    slider.value = 0;

                    currentEntryIdx = 0;
                    updateTimelineLabel();
                    updateDisplay();

                    setStatus(`✓ ${file.name} を読み込みました (${allData.entries.length} 時刻)`);
                } catch (err) {
                    setStatus(`❌ エラー: ${err.message}`);
                }
            };

            reader.readAsText(file);
        }

        // 可視化モード切り替え
        function setVizMode(mode) {
            vizMode = mode;

            // ボタンのアクティブ状態を更新
            document.querySelectorAll('.mode-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 粒子アニメーターの停止

            updateDisplay();
        }

        // 時刻スライダー
        function setTimelineIndex() {
            currentEntryIdx = parseInt(el('timeline-slider').value);
            updateTimelineLabel();
            updateDisplay();
        }

        function updateTimelineLabel() {
            if (!allData || !allData[currentEntryIdx]) return;
            const time = allData[currentEntryIdx].header.refTime;
            el('timelineLabel').textContent = time.substring(0, 16).replace('T', ' ');
        }

        function toggleTimeline() {
            if (timelineTimer) {
                clearInterval(timelineTimer);
                timelineTimer = null;
                el('playBtnText').textContent = '▶ 再生';
            } else {
                timelineTimer = setInterval(() => {
                    let idx = parseInt(el('timeline-slider').value);
                    idx = (idx + 1) % allData.length;
                    el('timeline-slider').value = idx;
                    setTimelineIndex();
                }, 800);
                el('playBtnText').textContent = '⏸ 停止';
            }
        }

        // 表示更新
        function updateDisplay() {
            if (!allData || !allData[currentEntryIdx]) {
                setStatus('データが読み込まれていません');
                return;
            }

            // 既存レイヤーを削除
            if (vizLayer) {
                if (vizLayer.remove) {
                    vizLayer.remove();
                } else {
                    map.removeLayer(vizLayer);
                }
                vizLayer = null;
            }

            const entry = allData[currentEntryIdx];
            const points = entry.data.map(p => ({ lat: p[0], lon: p[1], u: p[2], v: p[3] }));
            const filteredPoints = filterByLatitude(points);

            const arrowThickness = parseFloat(el('arrowThicknessSlider').value);
            const scale = parseFloat(el('scaleSlider').value);
            const particleSpeed = parseFloat(el('particleSpeedSlider').value);
            const colorBySpeed = el('colorBySpeed').checked;
            const maxSpeed = 0.5;  // 固定値（m/s）

            // モードに応じて描画
            switch (vizMode) {
                case 'arrow':
                    drawArrows(filteredPoints, scale, colorBySpeed, maxSpeed, arrowThickness);
                    break;
                case 'particle':
                    drawParticles(points, scale, colorBySpeed, maxSpeed, particleSpeed);
                    break;
            }

            el('arrowThicknessValue').textContent = arrowThickness.toFixed(1);
            el('scaleValue').textContent = scale.toFixed(1) + '×';
            el('particleSpeedValue').textContent = particleSpeed.toFixed(1) + '×';
            setStatus(`✓ ${filteredPoints.length} 本の矢印を描画（モード: ${vizMode}）`);
        }

        // フィルタリング（北緯41°以上）
        function filterByLatitude(data) {
            return data.filter(p => p.lat >= LAT_MIN);
        }

        // カラーマップ（速度 → 色）
        function speedToColor(speed, maxSpeed) {
            const ratio = Math.min(speed / maxSpeed, 1.0);
            let hue;
            if (ratio < 0.25) hue = 240;       // 青
            else if (ratio < 0.5) hue = 180;   // シアン
            else if (ratio < 0.75) hue = 120;  // 緑
            else if (ratio < 0.9) hue = 60;    // 黄
            else hue = 0;                      // 赤
            return `hsl(${hue}, 100%, 50%)`;
        }

        // ベクター矢印描画（改善版、矢印ヘッド付き）
        function drawArrows(points, scale, colorBySpeed, maxSpeed, arrowThickness) {
            const group = L.featureGroup();

            for (const p of points) {
                const u = p.u || 0;
                const v = p.v || 0;
                const speed = Math.sqrt(u * u + v * v);
                const color = colorBySpeed ? speedToColor(speed, maxSpeed) : '#00a8ff';

                const bearing = Math.atan2(u, v) * 180 / Math.PI;
                const len = Math.max(0.02, Math.min(0.2, speed * scale * 0.05));

                const rad = bearing * Math.PI / 180;
                const endLat = p.lat + len * Math.cos(rad);
                const endLon = p.lon + len * Math.sin(rad) / Math.cos(p.lat * Math.PI / 180);

                const line = L.polyline([[p.lat, p.lon], [endLat, endLon]], {
                    color: color,
                    weight: arrowThickness,
                    opacity: 0.8
                });

                group.addLayer(line);

                // 矢印ヘッドを追加
                const arrowSize = 0.01;
                const angle1 = rad + 2.6;  // 150度
                const angle2 = rad - 2.6;

                const head1Lat = endLat + arrowSize * Math.cos(angle1);
                const head1Lon = endLon + arrowSize * Math.sin(angle1) / Math.cos(endLat * Math.PI / 180);

                const head2Lat = endLat + arrowSize * Math.cos(angle2);
                const head2Lon = endLon + arrowSize * Math.sin(angle2) / Math.cos(endLat * Math.PI / 180);

                const arrowLine1 = L.polyline([[endLat, endLon], [head1Lat, head1Lon]], {
                    color: color,
                    weight: arrowThickness,
                    opacity: 0.8
                });
                const arrowLine2 = L.polyline([[endLat, endLon], [head2Lat, head2Lon]], {
                    color: color,
                    weight: arrowThickness,
                    opacity: 0.8
                });

                group.addLayer(arrowLine1);
                group.addLayer(arrowLine2);
            }

            vizLayer = group;
            map.addLayer(vizLayer);
        }


        // 粒子追跡描画（Leaflet-Velocity）
        function drawParticles(points, scale, colorBySpeed, maxSpeed, particleSpeed) {
            if (!allData || allData.length === 0) return;

            const velocityData = allData[currentEntryIdx];

            // Leaflet-Velocity レイヤーを作成
            const velocityLayer = L.velocityLayer({
                displayValues: true,
                displayOptions: {
                    velocityType: 'Ocean Current',
                    position: 'bottom right',
                    emptyString: 'No data',
                    speedUnit: 'm/s'
                },
                data: velocityData.data,
                maxVelocity: maxSpeed,
                colorScale: [
                    '#0088ff', // 青
                    '#00ffff', // シアン
                    '#00ff00', // 緑
                    '#ffff00', // 黄
                    '#ff0000'  // 赤
                ],
                particleAge: 90,
                particleOpacity: 0.9,
                particleMultiplier: particleSpeed * 2000,
                paths: 12,
                width: 1.5 * (scale / 1.0),
                padding: 40,
                velocityScale: scale
            });

            vizLayer = velocityLayer;
            map.addLayer(vizLayer);
        }

        // UV 補間
        function sampleUV(lat, lng, points) {
            let closestDist = Infinity;
            let closestUV = { u: 0, v: 0 };

            for (const p of points) {
                const dist = Math.pow(lat - p.lat, 2) + Math.pow(lng - p.lon, 2);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestUV = { u: p.u, v: p.v };
                }
            }

            return closestUV;
        }

        // 初期化
        window.addEventListener('load', () => {
            initMap();

            // GitHub Pages 環境では自動的に JSON を読み込む
            const isGitHubPages = window.location.hostname.includes('github.io');
            if (isGitHubPages) {
                loadJSONAuto();
            } else {
                setStatus('JSON ファイルを選択してください');
            }
        });

        // 自動 JSON 読み込み
        function loadJSONAuto() {
            fetch('processed/ocean_current_data.json')
                .then(r => r.json())
                .then(data => {
                    allData = data;
                    if (!Array.isArray(allData) || allData.length === 0) {
                        throw new Error('grib2json データが見つかりません');
                    }

                    const slider = el('timeline-slider');
                    slider.max = allData.length - 1;
                    slider.value = 0;

                    currentEntryIdx = 0;
                    updateTimelineLabel();
                    updateDisplay();

                    setStatus(`✓ 海流データを読み込みました (${allData.length} 時刻)`);
                })
                .catch(err => {
                    setStatus(`ファイル読み込みエラー: ${err.message}。手動で選択してください。`);
                });
        }
    </script>
</body>
</html>
